<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="admin_style.css">
    <script src="admin_common.js" defer></script>
    <style>
        .order-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f5f5f5; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .status-pending { background: #fff7ed; color: #9a3412; }
        .status-shipped { background: #f0f9ff; color: #075985; }
        .status-delivered { background: #f0fdf4; color: #166534; }
        .order-details { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 14px; }
        .item-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>Order Management</h1>
                <div class="user-info">
                    <span>Admin Manager</span>
                    <div class="avatar" style="background:#000; color:#fff; display:flex; align-items:center; justify-content:center; border-radius:50%; width:35px; height:35px;">A</div>
                </div>
            </header>

            <div class="content-area">
                <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <p style="color: #666;">View and manage customer orders below.</p>
                    <button class="btn btn-outline" onclick="fetchOrders()" style="font-size: 12px; padding: 8px 15px;"><i data-lucide="refresh-cw" style="width:14px; margin-right:5px;"></i> Refresh</button>
                </div>
                <div id="ordersList">
                    <p>Loading orders...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function fetchOrders() {
            const container = document.getElementById('ordersList');
            container.innerHTML = '<p style="text-align:center; padding: 50px;">Fetching orders...</p>';
            
            try {
                const response = await fetch(`${API_URL}/orders`);
                if (!response.ok) throw new Error('API down');
                
                const orders = await response.json();
                
                if (orders.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:100px; background:white; border-radius:15px; border:1px dashed #ccc;"><h3>No orders yet.</h3><p>Incoming orders will appear here automatically.</p></div>';
                    return;
                }

                container.innerHTML = '';
                for (const order of orders) {
                    const itemsResponse = await fetch(`${API_URL}/orders/${order.id}/items`);
                    const items = await itemsResponse.json();
                    container.innerHTML += createOrderCard(order, items);
                }
                lucide.createIcons();
            } catch (err) {
                container.innerHTML = '<p style="color:red; text-align:center;">Failed to load orders. Please check your connection.</p>';
                console.error(err);
            }
        }

        function createOrderCard(order, items) {
            const date = new Date(order.created_at).toLocaleString();
            const itemsHtml = items.map(item => `
                <div class="item-row">
                    <span>${item.product_name} x ${item.quantity}</span>
                    <span>$${(item.price * item.quantity).toFixed(2)}</span>
                </div>
            `).join('');

            return `
                <div class="order-card" id="order-${order.id}">
                    <div class="order-header">
                        <div>
                            <span style="font-weight: 700; font-size: 16px;">Order #${order.id}</span>
                            <span style="color: #888; font-size: 12px; margin-left: 10px;">${date}</span>
                        </div>
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <select onchange="updateStatus(${order.id}, this.value)" style="padding: 8px; border-radius: 6px; font-size: 12px; border: 1px solid #ddd; outline:none;">
                                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Shipped" ${order.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                            <span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span>
                            <button onclick="deleteOrder(${order.id})" style="background:none; border:none; color:#ff4d4d; cursor:pointer; padding:5px;"><i data-lucide="trash-2" style="width:18px;"></i></button>
                        </div>
                    </div>
                    <div class="order-details">
                        <div style="background: #fafafa; padding: 15px; border-radius: 8px;">
                            <p style="margin-bottom:8px;"><strong>👤 Customer:</strong> ${order.customer_name}</p>
                            <p style="margin-bottom:8px;"><strong>📧 Email:</strong> ${order.customer_email}</p>
                            <p style="margin-bottom:8px;"><strong>📞 Phone:</strong> ${order.customer_phone}</p>
                            <p style="margin-top: 15px; font-size:12px; color:#555;"><strong>📍 Shipping Address:</strong><br>${order.shipping_address}</p>
                        </div>
                        <div style="padding: 10px;">
                            <p style="font-weight: 700; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">Items Detail</p>
                            <div style="margin: 10px 0;">${itemsHtml}</div>
                            <div style="display:flex; justify-content:space-between; margin-top:15px; align-items:center;">
                                <span style="font-size:12px; color:#888;">Payment: ${order.payment_method}</span>
                                <span style="font-size: 20px; font-weight: 800;">Total: $${order.total_amount}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function updateStatus(id, status) {
            try {
                const response = await fetch(`${API_URL}/orders/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (response.ok) {
                    fetchOrders(); // Refresh without reload
                } else {
                    alert('Failed to update status');
                }
            } catch (err) { console.error(err); }
        }

        async function deleteOrder(id) {
            if (!confirm('Are you sure you want to PERMANENTLY delete this order?')) return;
            try {
                const response = await fetch(`${API_URL}/orders/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    document.getElementById(`order-${id}`).remove();
                } else {
                    alert('Failed to delete order');
                }
            } catch (err) { console.error(err); }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/login.html';
        }

        window.onload = fetchOrders;
    </script>
</body>
</html>
