<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | TECNIFY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="admin_style.css">
    <script src="admin_common.js" defer></script>
</head>
<body>

    <aside class="sidebar"></aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h2>Products Management</h2>
                <p style="color: var(--text-muted); font-size: 14px;">View and manage your product inventory.</p>
            </div>
            <button class="btn btn-primary" onclick="toggleModal(true)">
                <i data-lucide="plus"></i> Add New Product
            </button>
        </header>

        <div class="card">
            <div class="card-header">
                <div style="display: flex; gap: 15px;">
                    <input type="text" id="searchInput" placeholder="Search products..." style="width: 300px;">
                    <select id="categoryFilter" style="width: 150px;">
                        <option value="">All Categories</option>
                    </select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>IMAGE</th>
                        <th>PRODUCT NAME</th>
                        <th>CATEGORY</th>
                        <th>PRICE</th>
                        <th>COLOR</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal" id="addProductModal">
        <div class="modal-content" style="width: 600px;">
            <h3 style="margin-bottom: 25px;">Add New Product</h3>
            <form id="addProductForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="name" required placeholder="e.g. Vortex Pro Max">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category_id" id="categorySelect" required>
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Current Price ($)</label>
                        <input type="number" step="0.01" name="price" required placeholder="299.99">
                    </div>
                </div>
                <div class="form-group">
                    <label>Discount/Old Price ($) (Optional)</label>
                    <input type="number" step="0.01" name="old_price" placeholder="399.99">
                    <small style="color: var(--text-muted); font-size: 11px;">Show a strike-through price if on sale</small>
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <input type="text" name="color" placeholder="e.g. Space Gray">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" placeholder="Enter product details..." rows="3"></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Image 1</label>
                        <input type="file" name="image1" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Image 2</label>
                        <input type="file" name="image2" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Image 3</label>
                        <input type="file" name="image3" accept="image/*">
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 10px;">
                    <button type="button" class="btn btn-outline" onclick="toggleModal(false)">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        lucide.createIcons();
        
        function toggleModal(show) {
            document.getElementById('addProductModal').style.display = show ? 'flex' : 'none';
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const categories = await response.json();
                
                const select = document.getElementById('categorySelect');
                const filter = document.getElementById('categoryFilter');
                
                categories.forEach(cat => {
                    const opt = `<option value="${cat.id}">${cat.name}</option>`;
                    select.innerHTML += opt;
                    filter.innerHTML += opt;
                });
            } catch (err) {
                console.error('Error loading categories:', err);
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const products = await response.json();
                
                const tableBody = document.getElementById('productTableBody');
                tableBody.innerHTML = '';
                
                products.forEach(product => {
                    const row = `
                        <tr>
                            <td>
                                <img src="/uploads/${product.image1}" alt="" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: #eee;">
                            </td>
                            <td><strong>${product.name}</strong></td>
                            <td>${product.category_name || 'N/A'}</td>
                            <td>$${product.price}</td>
                            <td>${product.color || '-'}</td>
                            <td>
                                <div style="display: flex; gap: 8px;">
                                    <button onclick="deleteProduct(${product.id})" title="Delete" style="background: none; border: none; cursor: pointer;">
                                        <i data-lucide="trash" style="width: 16px; color: var(--danger);"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
                lucide.createIcons();
            } catch (err) {
                console.error('Error loading products:', err);
            }
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    alert('Product added successfully!');
                    toggleModal(false);
                    e.target.reset();
                    loadProducts();
                } else {
                    const error = await response.json();
                    alert('Failed to add product: ' + error.error);
                }
            } catch (err) {
                console.error('Submit error:', err);
            }
        });

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            
            try {
                const response = await fetch(`${API_URL}/products/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadProducts();
                }
            } catch (err) {
                console.error('Delete error:', err);
            }
        }

        window.onload = () => {
            loadCategories();
            loadProducts();
        };
    </script>
</body>
</html>
