<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag | TECNIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-body { padding: 80px 5%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 50px; }
        .cart-items-list { display: flex; flex-direction: column; gap: 30px; }
        .cart-item { display: grid; grid-template-columns: 120px 1fr 120px 100px; align-items: center; gap: 30px; padding-bottom: 30px; border-bottom: 1px solid var(--border); }
        .cart-item img { width: 120px; height: 120px; border-radius: 12px; background: var(--bg-alt); object-fit: cover; }
        .qty-ctrl { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 4px; padding: 5px; gap: 10px; width: fit-content; }
        .qty-btn { cursor: pointer; background: none; border: none; font-size: 18px; }
        .summary-card { background: var(--bg-alt); padding: 30px; border-radius: 20px; position: sticky; top: 100px; height: fit-content; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; }

        @media (max-width: 900px) {
            .cart-body { grid-template-columns: 1fr; gap: 30px; }
            .summary-card { position: static; width: 100%; }
        }

        @media (max-width: 600px) {
            .cart-item { grid-template-columns: 80px 1fr; gap: 15px; grid-template-rows: auto auto; }
            .cart-item img { width: 80px; height: 80px; }
            .qty-ctrl { grid-column: 1 / 3; width: 100%; justify-content: center; }
            .cart-item div:last-child { grid-column: 1 / 3; text-align: center; font-size: 18px; margin-top: 10px; }
        }
    </style>
</head>
<body>
    <nav></nav>

    <div class="shop-header">
        <h1>Your Shopping Bag</h1>
    </div>

    <div class="cart-body">
        <div class="cart-items-list" id="cartList">
        </div>

        <div class="summary-card">
            <h3 style="margin-bottom: 25px; font-family: var(--font-heading); text-transform: uppercase;">Order Summary</h3>
            <div class="summary-line"><span>Subtotal</span> <span id="subtotal">$0.00</span></div>
            <div class="summary-line"><span>Estimated Shipping</span> <span>$20.00</span></div>
            <div class="summary-line"><span>Tax (5%)</span> <span id="tax">$0.00</span></div>
            <div style="border-top: 1px solid var(--border); margin: 20px 0; padding-top: 20px;" class="summary-line">
                <strong style="font-size: 20px;">Total</strong>
                <strong style="font-size: 20px;" id="total">$0.00</strong>
            </div>
            <button class="btn btn-black" style="width: 100%; margin-top: 20px;" onclick="window.location.href='checkout.html'">Checkout Now</button>
        </div>
    </div>

    <footer></footer>

    <script src="common.js"></script>
    <script>
        function renderCart() {
            const cart = getCart();
            const list = document.getElementById('cartList');
            
            if (cart.length === 0) {
                list.innerHTML = '<h2>Your bag is empty.</h2><a href="Shop.html" class="btn btn-outline" style="margin-top: 20px; display: inline-block;">Start Shopping</a>';
                updateSummary(0);
                return;
            }

            let subtotal = 0;
            list.innerHTML = cart.map(item => {
                const total = item.price * item.quantity;
                subtotal += total;
                return `
                    <div class="cart-item">
                        <img src="${UPLOADS_URL}/${item.image}">
                        <div>
                            <h4 style="font-size: 18px; margin-bottom: 5px;">${item.name}</h4>
                            <p style="color: var(--text-muted); font-size: 14px;">Price: $${item.price}</p>
                            <button onclick="removeFromCart(${item.id})" style="background: none; border: none; color: #ff0000; font-size: 12px; cursor: pointer; margin-top: 10px; text-decoration: underline;">Remove</button>
                        </div>
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            <span style="min-width: 20px; text-align: center;">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                        <div style="font-weight: 700; text-align: right;">$${total.toFixed(2)}</div>
                    </div>
                `;
            }).join('');
            
            updateSummary(subtotal);
            lucide.createIcons();
        }

        function updateQty(id, delta) {
            const cart = getCart();
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity < 1) return removeFromCart(id);
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
                updateCartIcon();
            }
        }

        function removeFromCart(id) {
            let cart = getCart();
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            updateCartIcon();
        }

        function updateSummary(subtotal) {
            const tax = subtotal * 0.05;
            const shipping = subtotal > 0 ? 20 : 0;
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${(subtotal + tax + shipping).toFixed(2)}`;
        }

        window.onload = renderCart;
    </script>
</body>
</html>
