<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TECNIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .auth-card { background: white; padding: 50px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .auth-card h1 { font-family: var(--font-heading); font-size: 40px; text-transform: uppercase; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        .form-group input { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; }
    </style>
</head>
<body>
    <nav></nav>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Login</h1>
            <p style="color: #666; margin-bottom: 30px;">Welcome back! Please enter your details.</p>
            
            <form id="loginPageForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-black" style="width: 100%; padding: 18px; margin-top: 10px;">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 30px; font-size: 14px; color: #666;">
                New to Tecnify? <a href="signup.html" style="color: black; font-weight: 700;">Create an account</a>
            </p>
        </div>
    </div>

    <footer></footer>

    <script src="common.js"></script>
    <script>
        document.getElementById('loginPageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify({ ...data.user, email }));
                    localStorage.setItem('token', data.token);
                    alert('Login Successful!');
                    window.location.href = 'index.html';
                } else {
                    alert(data.error);
                }
            } catch (err) { console.error(err); }
        });
    </script>
</body>
</html>
