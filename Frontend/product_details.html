<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | TECNIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .details-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 80px;
            padding: 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .main-img {
            width: 100%;
            height: 700px;
            background: var(--bg-alt);
            border-radius: 8px;
            object-fit: cover;
        }
        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .thumb-img {
            width: 100%;
            height: 120px;
            background: var(--bg-alt);
            border-radius: 6px;
            cursor: pointer;
            object-fit: cover;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .thumb-img.active { border-color: black; }
        
        .product-info-panel h1 { font-family: var(--font-heading); font-size: 50px; text-transform: uppercase; margin-bottom: 20px; line-height: 1.1; }
        .price-wrapper { display: flex; align-items: baseline; gap: 15px; margin-bottom: 30px; }
        .product-price { font-size: 36px; font-weight: 700; color: #ff0000; }
        .old-price { font-size: 24px; color: #999; text-decoration: line-through; }
        
        .trust-badges {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
            padding: 30px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .badge-item { display: flex; align-items: center; gap: 15px; }
        .badge-icon { background: #f0f0f0; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .badge-text div:first-child { font-weight: 700; font-size: 14px; }
        .badge-text div:last-child { font-size: 12px; color: var(--text-muted); }

        .desc-section { margin-top: 40px; }
        .desc-section h3 { font-family: var(--font-heading); font-size: 18px; margin-bottom: 15px; text-transform: uppercase; }
        .product-desc { color: var(--text-muted); line-height: 1.6; font-size: 15px; }
        
        .action-btns { display: flex; gap: 15px; margin-top: 40px; }
        .qty-wrapper { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; }
        .qty-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 10px; }
        .qty-input { width: 50px; border: none; text-align: center; font-weight: 700; font-size: 16px; pointer-events: none; }
        .sale-tag { background: #ff0000; color: white; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 700; margin-bottom: 10px; display: inline-block; }

        @media (max-width: 1024px) {
            .details-container { grid-template-columns: 1fr; gap: 40px; padding: 40px 5%; }
            .main-img { height: 500px; }
            .product-info-panel h1 { font-size: 36px; }
        }

        @media (max-width: 600px) {
            .main-img { height: 350px; }
            .action-btns { flex-direction: column; }
            .qty-wrapper { width: 100%; justify-content: space-between; }
            .thumb-img { height: 80px; }
            .trust-badges { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav></nav>

    <div id="productDetails" class="details-container">
        <!-- Loaded via JS -->
    </div>

    <footer></footer>

    <script src="common.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProductDetails() {
            if (!productId) { window.location.href = 'Shop.html'; return; }

            try {
                const response = await fetch(`${API_BASE_URL}/products/${productId}`);
                const product = await response.json();
                
                const isOnSale = product.old_price && parseFloat(product.old_price) > parseFloat(product.price);

                document.getElementById('productDetails').innerHTML = `
                    <div class="product-gallery">
                        <img src="${UPLOADS_URL}/${product.image1}" class="main-img" id="mainDisplayImg">
                        <div class="thumb-grid">
                            <img src="${UPLOADS_URL}/${product.image1}" class="thumb-img active" onclick="updateImg(this)">
                            ${product.image2 ? `<img src="${UPLOADS_URL}/${product.image2}" class="thumb-img" onclick="updateImg(this)">` : ''}
                            ${product.image3 ? `<img src="${UPLOADS_URL}/${product.image3}" class="thumb-img" onclick="updateImg(this)">` : ''}
                        </div>
                    </div>
                    <div class="product-info-panel">
                        ${isOnSale ? '<span class="sale-tag">SALE</span>' : ''}
                        <p style="text-transform: uppercase; color: #888; font-weight: 600; font-size: 13px; letter-spacing: 1px; margin-bottom: 5px;">${product.category_name || 'Electronics'}</p>
                        <h1>${product.name}</h1>
                        
                        <div class="price-wrapper">
                            <span class="product-price">$${product.price}</span>
                            ${isOnSale ? `<span class="old-price">$${product.old_price}</span>` : ''}
                        </div>

                        <div class="desc-section">
                            <h3>Product Description</h3>
                            <div class="product-desc">${product.description || 'Elevate your electronic experience with this premium product, designed for both high performance and lasting durability.'}</div>
                        </div>

                        <div class="trust-badges">
                            <div class="badge-item">
                                <div class="badge-icon"><i data-lucide="shield-check" style="width: 20px;"></i></div>
                                <div class="badge-text"><div>1 Year</div><div>Warranty</div></div>
                            </div>
                            <div class="badge-item">
                                <div class="badge-icon"><i data-lucide="truck" style="width: 20px;"></i></div>
                                <div class="badge-text"><div>Free</div><div>Shipping</div></div>
                            </div>
                            <div class="badge-item">
                                <div class="badge-icon"><i data-lucide="users" style="width: 20px;"></i></div>
                                <div class="badge-text"><div>1,000,000+</div><div>Customers</div></div>
                            </div>
                            <div class="badge-item">
                                <div class="badge-icon"><i data-lucide="refresh-ccw" style="width: 20px;"></i></div>
                                <div class="badge-text"><div>7 Days</div><div>Replacement</div></div>
                            </div>
                        </div>

                        <div class="action-btns">
                            <div class="qty-wrapper">
                                <button class="qty-btn" onclick="adjustQty(-1)">-</button>
                                <input type="number" value="1" class="qty-input" id="qty">
                                <button class="qty-btn" onclick="adjustQty(1)">+</button>
                            </div>
                            <button class="btn btn-black" style="flex: 1;" onclick="addCurrentToCart()">Add to Bag</button>
                        </div>
                        
                        <div style="margin-top: 30px; font-size: 14px; border-top: 1px solid #eee; padding-top: 20px;">
                             <strong>Category:</strong> ${product.category_name || 'General'}<br>
                             <strong>SKU:</strong> TEC-${product.id}
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } catch (err) {
                console.error(err);
            }
        }

        function adjustQty(n) {
            const input = document.getElementById('qty');
            let val = parseInt(input.value) + n;
            if (val < 1) val = 1;
            input.value = val;
        }

        function updateImg(el) {
            document.getElementById('mainDisplayImg').src = el.src;
            document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        async function addCurrentToCart() {
            const qty = parseInt(document.getElementById('qty').value);
            const response = await fetch(`${API_BASE_URL}/products/${productId}`);
            const product = await response.json();
            
            for(let i=0; i<qty; i++) {
                const cart = getCart();
                const existing = cart.find(item => item.id === product.id);
                if (existing) existing.quantity += 1;
                else cart.push({ id: product.id, name: product.name, price: product.price, image: product.image1, quantity: 1 });
                localStorage.setItem('cart', JSON.stringify(cart));
            }
            updateCartIcon();
            alert(`✅ Added ${qty} ${product.name} to your bag!`);
        }

        window.onload = loadProductDetails;
    </script>
</body>
</html>
